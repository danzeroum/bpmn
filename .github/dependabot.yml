# Keeps the dev/build toolchain patched. Shipped packages are zero-runtime-dep,
# so the main exposure is the test/build stack (vitest, vite, esbuild) — which
# is exactly what `pnpm audit --audit-level=high` gates in ci.yml.
version: 2
updates:
  # npm/pnpm dependencies across the whole workspace (root manifest + packages).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR per week for the routine dev-tooling bumps to reduce noise.
      dev-dependencies:
        dependency-type: development

  # GitHub Actions used by the CI and release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
