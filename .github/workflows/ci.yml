name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      # engines declares >=20 — prove it on the floor and the current LTS.
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fail the build on any high/critical advisory in the dependency tree.
      # All shipped packages are zero-runtime-dep, so this guards the dev/build
      # toolchain (vitest, vite, esbuild, …) that Dependabot keeps patched.
      # npm RETIRED the audit endpoint pnpm calls (HTTP 410, 2026-07; latest
      # pnpm 10.33 still targets it) — ONLY that infra failure is tolerated,
      # with a warning; a real advisory still fails the build. Revisit when
      # pnpm switches to the bulk advisory endpoint (see DECISIONS.md).
      - name: pnpm audit (high) — tolerates retired registry endpoint
        run: |
          set +e
          out=$(pnpm audit --audit-level=high 2>&1)
          code=$?
          echo "$out"
          if [ $code -ne 0 ] && echo "$out" | grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE"; then
            echo "::warning::npm audit endpoint retired (410) — advisory gate skipped this run"
            exit 0
          fi
          exit $code
      - run: pnpm check:no-runtime-deps
      - run: pnpm check:no-key-generation
      # i18n cerca (N-6): no hardcoded UI strings on migrated surfaces + every
      # t() key resolves in the English fallback dictionary.
      - run: pnpm check:no-hardcoded-strings
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      # API-docs freshness (N-8): regenerate TypeDoc from the public types and
      # fail if the committed docs/api drifted (same pattern as CONFORMANCE.md).
      - run: pnpm check:docs-fresh
      # Download the real-world BPMN corpus (bpmn-js-examples / Camunda,
      # MIT+Apache-2.0) for the conformance round-trip. Never committed; the
      # tests skip when it's absent, so a network hiccup must not fail the build.
      - run: pnpm fetch:corpus
        continue-on-error: true
      - run: pnpm test:coverage
      # Publish the lcov report so the per-package thresholds in
      # vitest.config.mts are inspectable, not just pass/fail.
      - uses: actions/upload-artifact@v4
        if: matrix.node-version == 22
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @buildtovalue/example exec playwright install --with-deps chromium
      - run: pnpm e2e
