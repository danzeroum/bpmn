name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Fail the build on any high/critical advisory in the dependency tree.
      # All shipped packages are zero-runtime-dep, so this guards the dev/build
      # toolchain (vitest, vite, esbuild, …) that Dependabot keeps patched.
      - run: pnpm audit --audit-level=high
      - run: pnpm check:no-runtime-deps
      - run: pnpm check:no-key-generation
      # i18n cerca (N-6): no hardcoded UI strings on migrated surfaces + every
      # t() key resolves in the English fallback dictionary.
      - run: pnpm check:no-hardcoded-strings
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      # Download the real-world BPMN corpus (bpmn-js-examples / Camunda,
      # MIT+Apache-2.0) for the conformance round-trip. Never committed; the
      # tests skip when it's absent, so a network hiccup must not fail the build.
      - run: pnpm fetch:corpus
        continue-on-error: true
      - run: pnpm test:coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @buildtovalue/example exec playwright install --with-deps chromium
      - run: pnpm e2e
