# Publishes the @buildtovalue/* packages to npm.
#
# Manual trigger only (workflow_dispatch). Defaults to a DRY RUN so the whole
# pipeline can be validated without publishing; untick dry_run to release.
#
# Requirements (see pendencias.md):
#   - The npm scope (@buildtovalue) must exist and be owned by you.
#   - Repository secret NPM_TOKEN must hold an npm automation token.
#
# Version bumps flow through changesets: `pnpm changeset` per PR, then
# `pnpm version-packages` (or the release PR) before dispatching this.
name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate everything, publish nothing)'
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Fail-fast: um release REAL sem NPM_TOKEN morreria só no último passo
      # (ENEEDAUTH após ~4min de gate — visto no Release #2). Falha aqui, em
      # segundos, nomeando a causa. Dry-run não precisa do secret.
      - name: Fail fast when NPM_TOKEN is missing (real release only)
        if: ${{ !inputs.dry_run }}
        env:
          HAS_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::error::Secret NPM_TOKEN ausente/vazio (Settings → Secrets and variables → Actions → Repository secrets). O publish falharia com ENEEDAUTH. Use um token de AUTOMAÇÃO do npm com permissão de publish na org @buildtovalue."
            exit 1
          fi
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile

      # The full quality gate must be green before anything reaches npm.
      - run: pnpm check:no-runtime-deps
      - run: pnpm audit --audit-level=high
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test:coverage

      # Releases consume changesets: fail loudly when pending changesets have
      # not been versioned (`pnpm version-packages`) before dispatching.
      # PRE-MODE aware: em pre mode os .md ficam no diretório até o
      # `changeset pre exit` — "pendente" é só o que NÃO consta como aplicado
      # em .changeset/pre.json. Sem pre.json, todo .md é pendente (fluxo comum).
      - name: Check for unconsumed changesets
        run: |
          node -e "
            const fs = require('fs');
            const pre = fs.existsSync('.changeset/pre.json')
              ? JSON.parse(fs.readFileSync('.changeset/pre.json', 'utf8'))
              : null;
            const mds = fs.readdirSync('.changeset')
              .filter((f) => f.endsWith('.md') && f !== 'README.md')
              .map((f) => f.replace(/\.md$/, ''));
            const applied = new Set(pre ? pre.changesets : []);
            const pending = mds.filter((id) => !applied.has(id));
            if (pending.length > 0) {
              console.error('::error::Pending changesets (' + pending.length + '): ' + pending.join(', ') + \" — run 'pnpm version-packages' and merge the version PR before releasing.\");
              process.exit(1);
            }
            console.log(pre ? 'pre mode (' + pre.tag + '): ' + applied.size + ' changesets versionados retidos — ok' : 'nenhum changeset pendente — ok');
          "

      # Software Bill of Materials for the release (CycloneDX JSON), attached
      # as a build artifact for supply-chain transparency / SBOM requirements.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

      # Private packages (the example app) are skipped automatically.
      - name: Publish to npm
        run: >
          pnpm -r publish --access public --no-git-checks
          ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
